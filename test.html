<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW SPACE</title>
    <style>
        /* 기존 스타일을 무시하고 새로 정의합니다 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #ffffff; /* 배경을 흰색으로 깨끗하게 */
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* 디자인이 너무 퍼지지 않게 잡아줌 */
            padding: 20px;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0px; /* 필요하면 15px 정도로 조절하세요 */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="9999.jpg" alt="My New Site">
    </div>

</body>
</html>
