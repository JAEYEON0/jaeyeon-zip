<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip | NEW SPACE</title>
    <style>
        /* 기본 레이아웃 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #ffffff; /* 깨끗한 화이트 배경 */
            display: flex;
            flex-direction: column; /* 세로 정렬 */
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* 너무 퍼지지 않게 고정 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 이미지 스타일 */
        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0px; 
            margin-bottom: 40px; /* 버튼과의 간격 */
        }

        /* 🏠 홈으로 돌아가는 버튼 스타일 */
        .home-link {
            text-decoration: none;
            color: #ccc; /* 은은한 회색 */
            font-size: 13px;
            font-family: 'Pretendard', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
            padding-bottom: 5px;
            margin-bottom: 50px;
        }

        .home-link:hover {
            color: #a78bfa; /* 거실 포인트 컬러인 연보라색 */
            border-bottom: 1px solid #a78bfa;
        }

        /* 하단 카피라이트 */
        .footer-text {
            font-size: 11px;
            color: #eee;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="9999.jpg" alt="My New Site">

</html>
