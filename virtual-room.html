<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip | ROOM</title>
    <style>
        /* 🖱️ 마우스 커서 설정 */
        body { 
            margin: 0; padding: 0; 
            background-color: #ffffff; 
            font-family: 'Pretendard', sans-serif; 
            color: #333; 
            display: flex; flex-direction: column; align-items: center; 
            /* 기본 커서를 업로드하신 이미지로 변경 */
            cursor: url('cursor.gif') 16 16, auto; 
        }

        /* 🔗 링크와 버튼에 마우스 올렸을 때도 커서 유지 */
        a, button { 
            cursor: url('cursor.gif') 16 16, pointer !important; 
        }

        nav { width: 100%; max-width: 900px; padding: 60px 0 40px 0; display: flex; justify-content: center; gap: 40px; }
        nav a { text-decoration: none; color: #ccc; font-size: 13px; font-weight: 600; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover { color: #ffb6c1; }
        
        .main-container { width: 90%; max-width: 1000px; display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        .card { background: #fff; border: 1px solid #f2f2f2; border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .profile-img { width: 100%; border-radius: 18px; margin-bottom: 20px; }
        .status-text { font-size: 14px; line-height: 1.8; color: #555; }
        
        .room-image-container img { width: 100%; height: auto; border-radius: 15px; display: block; }
        
        footer { margin: 100px 0 50px 0; font-size: 11px; color: #eee; letter-spacing: 3px; }
        
        @media (max-width: 850px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="virtual-room.html" style="color: #ffb6c1;">ROOM</a>
        <a href="test.html">NEW SPACE</a>
        <a href="links.html">LINK</a>
    </nav>

    <div class="main-container">
        <aside class="card">
            <img src="profile.jpg" alt="Profile" class="profile-img">
            <div class="status-text">
                <strong style="font-size: 20px; color: #222;">MY ROOM</strong><br>
                COZY & SWEET SPACE 🧸<br><br>
                <span style="color: #ffb6c1;">●</span> Status: Resting<br>
                <span style="color: #ffb6c1;">●</span> Mood: Pinkish
            </div>
        </aside>

        <main class="card">
            <p style="margin-top:0; font-size:11px; color:#ccc; margin-bottom:15px; letter-spacing: 1px;">VIRTUAL ROOM VIEW</p>
            <div class="room-image-container">
                <img src="room_rpt.jpg" alt="Virtual Room">
            </div>
        </main>
    </div>
    <footer>© JAE-YEON.zip</footer>
</body>
</html>
