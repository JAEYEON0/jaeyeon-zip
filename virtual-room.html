<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip | Virtual Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 메뉴 링크 스타일 */
        .nav-bar a { text-decoration: none; color: inherit; display: inline-block; transition: 0.2s; }
        .nav-bar a:hover { transform: scale(1.1); color: #a78bfa; }
        
        /* 버추얼 룸 레이아웃 */
        .room-layout {
            display: grid;
            grid-template-columns: 2fr 1fr; /* 방 전경과 소품 섹션 구분 */
            gap: 20px;
        }

        /* 메인 방 이미지 (레퍼런스 이미지 배치) */
        .room-display {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .room-img {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 소품 섹션 (이미지 속 아이템들을 텍스트로 표현) */
        .deco-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .deco-item {
            background: rgba(255, 209, 220, 0.5); /* 핑크 테마 */
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }
        .deco-item h4 { margin: 0 0 10px 0; color: #db2777; }
        .deco-item p { margin: 0; font-size: 0.9em; }

        @media (max-width: 768px) {
            .room-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header">
            <div class="logo-wrapper">
                <span class="cat-ear">Ꮚ</span>
                <div class="logo">Virtual Room</div>
                <span class="cat-ear">Ꮚ</span>
            </div>
            <nav class="nav-bar">
                <a href="index.html"><span>home</span></a>
                <a href="virtual-room.html"><span style="color: #a78bfa;">virtual room</span></a>
                <span>portfolio</span>
                <span>shop</span>
            </nav>
        </header>

        <main class="content-wrapper" style="display: block;">
            <div class="room-layout">
                <div class="room-display">
                    <h3>🏠 나의 핑크빛 방 전경</h3>
                    <p style="margin-bottom: 20px;">이런 느낌으로 내 공간을 채워나가고 싶어! (◡‿◡✿)</p>
                    <img src="room_ref.png" alt="room-deco" class="room-img">
                </div>

                <div class="deco-section">
                    <div class="deco-item glass-card">
                        <h4>🎁 침대 위 친구들</h4>
                        <ul class="status-list" style="margin: 0; padding-left: 15px; text-align: left;">
                            <li>🐱 헬로키티 쿠션</li>
                            <li>🐻 리락쿠마 인형</li>
                        </ul>
                    </div>
                    
                    <div class="deco-item glass-card">
                        <h4>🎀 특별 소품</h4>
                        <ul class="status-list" style="margin: 0; padding-left: 15px; text-align: left;">
                            <li>🐰 마이멜로디 가방</li>
                            <li>💖 헬로키티 러그</li>
                            <li>🌸 핑크색 가구</li>
                        </ul>
                    </div>
                    
                    <div class="deco-item glass-card">
                        <h4>✨ 오늘의 기분</h4>
                        <p style="text-align: left;">이 방에 있는 것만으로도 행복해지는 느낌이야! (◡‿◡✿)</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('mousemove', function(e) {
            const star = document.createElement('div');
            star.className = 'mouse-particle';
            star.style.left = e.pageX + 'px';
            star.style.top = e.pageY + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 800);
        });
    </script>
</body>
</html>
