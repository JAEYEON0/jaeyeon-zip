<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header class="header">
            <div class="spotify-player">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <div class="logo-wrapper">
                <span class="cat-ear">Ꮚ</span>
                <div class="logo">JAE-YEON.zip</div>
                <span class="cat-ear">Ꮚ</span>
            </div>
            <nav class="nav-bar">
                <span>home</span>
                <span>virtual room</span>
                <span>portfolio</span>
                <span>shop</span>
            </nav>
        </header>

        <div class="ticker">나의 작은 공간에 온 걸 환영해! ENJOY YOUR STAY ✩</div>

        <main class="content-wrapper">
            <section class="profile-side">
                <div class="profile-box">
                    <img src="profile.jpg" alt="profile" class="profile-img">
                    <div class="profile-info">
                        <p>JAE-YEON</p>
                        <hr class="divider">
                        <ul class="status-list">
                            <li><b>상태:</b> 🍄 작업 중</li>
                            <li><b>기분:</b> ☁️ 나른함</li>
                            <li><b>중독된 것:</b> 👾 발로란트</li>
                        </ul>
                    </div>
                </div>
            </section>

            <section class="main-side">
                <div class="glass-card">
                    <h3>♥ welcome</h3>
                    <p>나의 작은 공간에 온 걸 환영해! 여기는 내가 좋아하는 것들을 기록하는 곳이야! ( ◡‿◡ *)</p>
                </div>
                
                <div class="glass-card guestbook">
                    <h3>💬 guestbook</h3>
                    <div class="input-group">
                        <input type="text" id="gb-name" placeholder="이름..">
                        <textarea id="gb-msg" placeholder="방명록 남기기"></textarea>
                        <button class="post-btn" onclick="addMessage()">post! ♡</button>
                    </div>
                    <div id="gb-list" class="gb-list"></div>
                </div>
            </section>

            <section class="update-side">
                <div class="miku-area">
                    <div class="miku-balloon">hi! (◡‿◡✿)</div>
                    <img src="new-photo.gif" alt="미쿠" class="miku-gif">
                </div>
            </section>
        </main>
    </div>

    <script>
        // 1. 마우스 반짝이 효과
        document.addEventListener('mousemove', function(e) {
            const star = document.createElement('div');
            star.className = 'mouse-particle';
            star.style.left = e.pageX + 'px';
            star.style.top = e.pageY + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 800);
        });

        // 2. 방명록 기능
        window.onload = function() { displayMessages(); };

        function addMessage() {
            const name = document.getElementById('gb-name').value;
            const msg = document.getElementById('gb-msg').value;
            if (name === "" || msg === "") { alert("내용을 입력해줘! Ꮚ◡‿◡Ꮚ"); return; }

            const newMessage = { name, msg, date: new Date().toLocaleString() };
            let messages = JSON.parse(localStorage.getItem('guestbook')) || [];
            messages.unshift(newMessage);
            localStorage.setItem('guestbook', JSON.stringify(messages));

            document.getElementById('gb-name').value = "";
            document.getElementById('gb-msg').value = "";
            displayMessages();
        }

        function displayMessages() {
            const listDiv = document.getElementById('gb-list');
            const messages = JSON.parse(localStorage.getItem('guestbook')) || [];
            listDiv.innerHTML = messages.map(m => `
                <div class="gb-item">
                    <div class="gb-item-header"><strong>${m.name}</strong> <span>${m.date}</span></div>
                    <div class="gb-item-content">${m.msg}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
