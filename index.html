<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip | HOME</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            max-width: 900px;
            padding: 60px 0 40px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: #a78bfa; }

        .main-container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        .card {
            background: #fff;
            border: 1px solid #f2f2f2;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }

        .profile-img {
            width: 100%;
            border-radius: 18px;
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .content-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #f9f9f9;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            margin: 100px 0 50px 0;
            font-size: 11px;
            color: #eee;
            letter-spacing: 3px;
        }

        @media (max-width: 850px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="virtual-room.html">ROOM</a>
        <a href="test.html">NEW SPACE</a>
        <a href="#">SHOP</a>
    </nav>

    <div class="main-container">
        <aside class="card">
            <img src="profile.jpg" alt="Profile" class="profile-img">
            <div class="status-text">
                <strong style="font-size: 20px; color: #222;">JAE-YEON</strong><br>
                WELCOME TO MY ARCHIVE 👾<br><br>
                <span style="color: #a78bfa;">●</span> Status: Coding<br>
                <span style="color: #ffb6c1;">●</span> Mood: Cozy
            </div>
        </aside>

        <main class="content-stack">
            <div class="card">
                <p style="margin-top:0; font-size:11px; color:#ccc; margin-bottom:15px; letter-spacing: 1px;">NOW PLAYING</p>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/8rMARLBfd3U" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>

            <div class="card">
                <p style="margin-top:0; font-size:11px; color:#ccc; margin-bottom:15px; letter-spacing: 1px;">GUESTBOOK</p>
                <script src="https://static.elfsight.com/platform/platform.js" data-use-service-core defer></script>
                <div class="elfsight-app-7013867c-3f95-442a-a92c-f673859661f4" data-elfsight-app-lazy></div>
            </div>
        </main>
    </div>

    <footer>© JAE-YEON.zip</footer>

</body>
</html>
