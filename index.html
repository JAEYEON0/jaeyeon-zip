<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAE-YEON.zip | HOME</title>
    <style>
        /* 1. 전체 배경: 화이트 미니멀 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. 상단 메뉴바 */
        nav {
            width: 100%;
            max-width: 900px;
            padding: 60px 0 40px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        nav a {
            text-decoration: none;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #a78bfa;
        }

        /* 3. 레이아웃 구조 */
        .main-container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        /* 4. 카드 디자인 */
        .card {
            background: #fff;
            border: 1px solid #f2f2f2;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }

        .profile-img {
            width: 100%;
            border-radius: 18px;
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
        }

        .content-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 유튜브 플레이어 비율 유지 */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #f9f9f9;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 방명록 위젯 박스 */
        .guestbook-box {
            width: 100%;
            min-height: 300px; /* 방명록 높이에 맞춰 조절 가능 */
            border-radius: 12px;
            overflow: hidden;
        }

        footer {
            margin: 100px 0 50px 0;
            font-size: 11px;
            color: #eee;
            letter-spacing: 3px;
        }

        @media (max-width: 850px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
